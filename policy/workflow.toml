[public_surface]
long_running = ["design-task", "implement-task"]

[projection]
required_helper_agent_ids = [
  "browser-explorer",
  "verification-worker",
  "architecture-reviewer",
  "code-quality-reviewer",
  "structure-reviewer",
  "type-specialist",
  "react-state-reviewer",
  "test-engineer",
  "web-researcher",
]
documentation_only_builtins = ["monitor"]

[codex]
default_reasoning_effort = "high"

[codex.reasoning_effort_overrides]
web-researcher = "medium"
verification-worker = "medium"
structure-reviewer = "medium"
code-quality-reviewer = "medium"
test-engineer = "medium"
type-specialist = "medium"
browser-explorer = "medium"

[codex.sandbox_overrides]
browser-explorer = "danger-full-access"

[review_triggers]
code_quality_min_changed_files = 3
architecture_min_changed_files = 7
architecture_min_boundary_changes = 2
structure_review_min_diff_loc = 150
structure_review_min_changed_files = 2
blocking_gate_min_design_docs = 3

[slice_budget]
max_repo_files = 3
max_net_loc = 150
enforcement = "split-before-execution"

[structure_review]
soft_limit_behavior = "split-first"
hard_limit_behavior = "block"
responsibility_mix_behavior = "block"
legacy_oversized_file_behavior = "allow-only-without-additive-growth"
exceptions = [
  "*.generated.*",
  "route manifest",
  "icon registry",
  "schema declaration files",
  "migration snapshot",
  "vendored third-party",
]
split_roles = [
  "component",
  "view",
  "hook",
  "provider",
  "view-model",
  "composable",
  "middleware",
  "service",
  "use-case",
  "repository",
  "controller",
  "util",
  "adapter",
]

[structure_review.role_limits]
component_view = { target = 220, hard = 300 }
react_hook_provider_view_model = { target = 150, hard = 220 }
hook_composable_middleware = { target = 150, hard = 220 }
service_use_case_controller_repository_util_module = { target = 200, hard = 260 }
function = { target = 40, hard = 60 }

[task_documents]
plan_section_order = [
  "Goal",
  "Task Type",
  "Scope / Non-goals",
  "Keep / Change / Don't touch",
  "Evidence",
  "Decisions / Open questions",
  "Execution slices",
  "Verification",
  "Stop / Replan conditions",
]
status_section_order = [
  "Current slice",
  "Done",
  "Decisions made during implementation",
  "Verification results",
  "Known issues / residual risk",
  "Next slice",
]
bundle_core_docs = [
  "task.yaml",
  "README.md",
  "EXECUTION_PLAN.md",
  "SPEC_VALIDATION.md",
  "STATUS.md",
]
bundle_task_yaml_required_keys = [
  "task",
  "goal",
  "success_criteria",
  "major_boundaries",
  "work_type",
  "impact_flags",
  "required_docs",
  "source_of_truth",
  "ids",
  "delivery_strategy",
  "agent_orchestration",
  "validation_gate",
  "current_phase",
]
bundle_agent_orchestration_required_keys = [
  "strategy",
  "main_thread_role",
  "planning_helpers",
  "execution_roles",
  "context_policy",
  "fallback_policy",
  "review_policy",
]
bundle_agent_orchestration_strategies = ["manager"]
bundle_agent_orchestration_main_thread_roles = ["synthesize-control-only"]
bundle_execution_plan_section_order = [
  "Execution slices",
  "Verification",
  "Stop / Replan conditions",
]
bundle_execution_plan_slice_required_fields = [
  "Change boundary",
  "Expected files",
  "Orchestration",
  "Preflight helpers",
  "Implementation owner",
  "Integration owner",
  "Validation owner",
  "Allowed main-thread actions",
  "Focused validation plan",
  "Stop / Replan trigger",
]
bundle_work_types = [
  "feature",
  "bugfix",
  "refactor",
  "migration",
  "prototype",
  "ops",
]
bundle_impact_flags = [
  "ui_surface_changed",
  "workflow_changed",
  "architecture_significant",
  "public_contract_changed",
  "data_contract_changed",
  "operability_changed",
  "high_user_risk",
]
bundle_delivery_strategies = ["standard", "ui-first"]
bundle_execution_topologies = ["keep-local", "csv-fanout", "hybrid"]
bundle_csv_fanout_docs = ["GLOBAL_CONTEXT.md", "MERGE_POLICY.md"]
bundle_csv_fanout_orchestration_required_keys = [
  "row_unit", "batch_mode", "shared_context_files",
  "roles", "csv", "merge_policy",
]
bundle_ui_first_work_types = ["feature", "bugfix", "refactor", "prototype"]
bundle_ui_first_flags = ["ui_surface_changed", "workflow_changed"]
bundle_ui_required_docs = [
  "UX_SPEC.md",
  "UX_BEHAVIOR_ACCESSIBILITY.md",
  "DESIGN_REFERENCES/",
]
bundle_validation_gate_values = ["advisory", "blocking"]
bundle_blocking_validation_flags = [
  "ui_surface_changed",
  "workflow_changed",
  "architecture_significant",
  "public_contract_changed",
  "data_contract_changed",
  "operability_changed",
  "high_user_risk",
]
bundle_design_docs = [
  "PRD.md",
  "UX_SPEC.md",
  "UX_BEHAVIOR_ACCESSIBILITY.md",
  "DESIGN_REFERENCES/",
  "TECH_SPEC.md",
  "BUG_REPORT.md",
  "ROOT_CAUSE.md",
  "REGRESSION.md",
  "CURRENT_STATE.md",
  "TARGET_STATE.md",
  "MIGRATION.md",
  "VERIFICATION.md",
  "ROLLBACK.md",
  "CHANGE_PLAN.md",
  "RUNBOOK.md",
]
bundle_ux_spec_flags = ["ui_surface_changed", "workflow_changed"]
bundle_tech_spec_flags = [
  "architecture_significant",
  "public_contract_changed",
  "data_contract_changed",
  "operability_changed",
]
bundle_public_contract_docs = ["openapi.yaml"]
bundle_data_contract_docs = ["schema.json"]
bundle_bugfix_regression_flags = [
  "high_user_risk",
  "public_contract_changed",
  "data_contract_changed",
]
bundle_refactor_acceptance_flags = [
  "ui_surface_changed",
  "workflow_changed",
  "public_contract_changed",
  "high_user_risk",
]
bundle_prototype_acceptance_flags = [
  "public_contract_changed",
  "data_contract_changed",
  "high_user_risk",
]
bundle_spec_validation_section_order = [
  "Requirement coverage",
  "UX/state gaps",
  "Architecture/operability risks",
  "Slice dependency risks",
  "Blocking issues",
  "Proceed verdict",
]
generated_skill_manifest_name = ".claude-setup-generated-skills.json"

[task_documents.bundle_traceability_ids]
requirement_prefix = "REQ"
screen_prefix = "SCR"
flow_prefix = "FLOW"
adr_prefix = "ADR"
acceptance_prefix = "AC"
slice_prefix = "SLICE"
risk_prefix = "RISK"

[task_documents.bundle_optional_source_of_truth_paths]
product = "PRD.md"
ux = "UX_SPEC.md"
ux_behavior = "UX_BEHAVIOR_ACCESSIBILITY.md"
design_references = "DESIGN_REFERENCES/manifest.json"
architecture = "TECH_SPEC.md"
acceptance = "ACCEPTANCE.feature"

[task_documents.bundle_base_docs]
feature = ["PRD.md", "ACCEPTANCE.feature"]
bugfix = ["BUG_REPORT.md", "ROOT_CAUSE.md", "ACCEPTANCE.feature"]
refactor = ["CURRENT_STATE.md", "TARGET_STATE.md"]
migration = ["TECH_SPEC.md", "MIGRATION.md", "VERIFICATION.md", "ROLLBACK.md"]
prototype = ["PRD.md", "VERIFICATION.md"]
ops = ["CHANGE_PLAN.md", "RUNBOOK.md", "ROLLBACK.md", "VERIFICATION.md"]
