[public_surface]
long_running = ["plan", "build"]

[projection]
required_helper_agent_ids = [
  "browser-explorer",
  "verification-worker",
  "architecture-reviewer",
  "code-quality-reviewer",
  "structure-reviewer",
  "type-specialist",
  "react-state-reviewer",
  "test-engineer",
  "web-researcher",
]
documentation_only_builtins = ["monitor"]

[codex]
default_reasoning_effort = "high"

[codex.reasoning_effort_overrides]
web-researcher = "medium"
verification-worker = "medium"
structure-reviewer = "medium"
code-quality-reviewer = "medium"
test-engineer = "medium"
type-specialist = "medium"
browser-explorer = "medium"

[codex.sandbox_overrides]
browser-explorer = "danger-full-access"

[orchestration_budget]
max_helpers_per_fanout = 4
max_total_fanouts_per_session = 3
prefer_low_cost_for = ["web-researcher", "verification-worker"]

[review_triggers]
code_quality_min_changed_files = 3
architecture_min_changed_files = 7
architecture_min_boundary_changes = 2
structure_review_min_diff_loc = 150
structure_review_min_changed_files = 2
blocking_gate_min_design_docs = 3

[slice_budget]
max_repo_files = 3
max_net_loc = 150
enforcement = "split-before-execution"

[structure_review]
soft_limit_behavior = "split-first"
hard_limit_behavior = "block"
responsibility_mix_behavior = "block"
legacy_oversized_file_behavior = "allow-only-without-additive-growth"
exceptions = [
  "*.generated.*",
  "route manifest",
  "icon registry",
  "schema declaration files",
  "migration snapshot",
  "vendored third-party",
]
split_roles = [
  "component",
  "view",
  "hook",
  "provider",
  "view-model",
  "composable",
  "middleware",
  "service",
  "use-case",
  "repository",
  "controller",
  "util",
  "adapter",
]

[structure_review.role_limits]
component_view = { target = 220, hard = 300 }
react_hook_provider_view_model = { target = 150, hard = 220 }
hook_composable_middleware = { target = 150, hard = 220 }
service_use_case_controller_repository_util_module = { target = 200, hard = 260 }
function = { target = 40, hard = 60 }

[manifest]
generated_skill_manifest_name = ".claude-setup-generated-skills.json"
