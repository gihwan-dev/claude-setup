[public_surface]
long_running = ["design-task", "implement-task"]

[projection]
required_helper_agent_ids = [
  "explorer",
  "verification-worker",
  "architecture-reviewer",
  "code-quality-reviewer",
  "type-specialist",
  "test-engineer",
  "module-structure-gatekeeper",
  "frontend-structure-gatekeeper",
]
disabled_writable_projection_agent_ids = [
  "frontend-developer",
  "qa-engineer",
  "refactoring-expert",
  "typescript-pro",
  "storybook-specialist",
  "prompt-engineer",
  "project-planner",
]
documentation_only_builtins = ["monitor"]
internal_planning_role_ids = [
  "web-researcher",
  "solution-analyst",
  "product-planner",
  "structure-planner",
  "ux-journey-critic",
  "delivery-risk-planner",
  "prompt-systems-designer",
]

[codex]
expected_reasoning_effort = "xhigh"

[helper_close]
strong_close_reasons = ["explicit-cancel"]
advisory_timeout_policy = "background-no-close"
non_advisory_timeout_policy = "observe-and-status-ping"
non_cancel_status_ping_mode = "non-interrupt-only"
status_ping_delivery = "queued-only"
blocking_timeout_path = "longer-wait-then-queued-status-probe-then-background-or-natural-completion"
immediate_status_check_policy = "explicit-cancel-only"
synthetic_interrupt_reason = "explicit-cancel"
fallback_requires_ack = "terminal-or-background"
invalid_close_reason = "result-no-longer-needed"
helper_close_ack_definition = "final 또는 drain grace 이후 checkpoint/terminal runtime ack"
terminal_runtime_statuses = [
  "blocked",
  "cancelled",
  "completed",
  "errored",
  "interrupted",
]

[slice_budget]
max_repo_files = 3
max_net_loc = 150
enforcement = "split-before-execution"

[structure_policy]
soft_limit_behavior = "split-first"
hard_limit_behavior = "block"
responsibility_mix_behavior = "block"
legacy_oversized_file_behavior = "allow-only-without-additive-growth"
exceptions = [
  "*.generated.*",
  "route manifest",
  "icon registry",
  "schema declaration files",
  "migration snapshot",
  "vendored third-party",
]
split_roles = [
  "component",
  "view",
  "hook",
  "provider",
  "view-model",
  "composable",
  "middleware",
  "service",
  "use-case",
  "repository",
  "controller",
  "util",
  "adapter",
]

[structure_policy.role_limits]
component_view = { target = 220, hard = 300 }
react_hook_provider_view_model = { target = 150, hard = 220 }
hook_composable_middleware = { target = 150, hard = 220 }
service_use_case_controller_repository_util_module = { target = 200, hard = 260 }
function = { target = 40, hard = 60 }

[task_documents]
plan_section_order = [
  "Goal",
  "Task Type",
  "Scope / Non-goals",
  "Keep / Change / Don't touch",
  "Evidence",
  "Decisions / Open questions",
  "Execution slices",
  "Verification",
  "Stop / Replan conditions",
]
status_section_order = [
  "Current slice",
  "Done",
  "Decisions made during implementation",
  "Verification results",
  "Known issues / residual risk",
  "Next slice",
]
bundle_core_docs = [
  "task.yaml",
  "README.md",
  "EXECUTION_PLAN.md",
  "SPEC_VALIDATION.md",
  "STATUS.md",
]
bundle_task_yaml_required_keys = [
  "task",
  "goal",
  "success_criteria",
  "major_boundaries",
  "work_type",
  "impact_flags",
  "required_docs",
  "source_of_truth",
  "ids",
  "delivery_strategy",
  "validation_gate",
  "current_phase",
]
bundle_execution_plan_section_order = [
  "Execution slices",
  "Verification",
  "Stop / Replan conditions",
]
bundle_work_types = [
  "feature",
  "bugfix",
  "refactor",
  "migration",
  "prototype",
  "ops",
]
bundle_impact_flags = [
  "ui_surface_changed",
  "workflow_changed",
  "architecture_significant",
  "public_contract_changed",
  "data_contract_changed",
  "operability_changed",
  "high_user_risk",
]
bundle_delivery_strategies = ["standard", "ui-first"]
bundle_ui_first_work_types = ["feature", "bugfix", "refactor", "prototype"]
bundle_ui_first_flags = ["ui_surface_changed", "workflow_changed"]
bundle_ui_required_docs = [
  "UX_SPEC.md",
  "UX_BEHAVIOR_ACCESSIBILITY.md",
  "DESIGN_REFERENCES/",
]
bundle_validation_gate_values = ["advisory", "blocking"]
bundle_blocking_validation_flags = [
  "ui_surface_changed",
  "workflow_changed",
  "architecture_significant",
  "public_contract_changed",
  "data_contract_changed",
  "operability_changed",
  "high_user_risk",
]
bundle_design_docs = [
  "PRD.md",
  "UX_SPEC.md",
  "UX_BEHAVIOR_ACCESSIBILITY.md",
  "DESIGN_REFERENCES/",
  "TECH_SPEC.md",
  "BUG_REPORT.md",
  "ROOT_CAUSE.md",
  "REGRESSION.md",
  "CURRENT_STATE.md",
  "TARGET_STATE.md",
  "MIGRATION.md",
  "VERIFICATION.md",
  "ROLLBACK.md",
  "CHANGE_PLAN.md",
  "RUNBOOK.md",
]
bundle_ux_spec_flags = ["ui_surface_changed", "workflow_changed"]
bundle_tech_spec_flags = [
  "architecture_significant",
  "public_contract_changed",
  "data_contract_changed",
  "operability_changed",
]
bundle_public_contract_docs = ["openapi.yaml"]
bundle_data_contract_docs = ["schema.json"]
bundle_bugfix_regression_flags = [
  "high_user_risk",
  "public_contract_changed",
  "data_contract_changed",
]
bundle_refactor_acceptance_flags = [
  "ui_surface_changed",
  "workflow_changed",
  "public_contract_changed",
  "high_user_risk",
]
bundle_prototype_acceptance_flags = [
  "public_contract_changed",
  "data_contract_changed",
  "high_user_risk",
]
bundle_spec_validation_section_order = [
  "Requirement coverage",
  "UX/state gaps",
  "Architecture/operability risks",
  "Slice dependency risks",
  "Blocking issues",
  "Proceed verdict",
]
legacy_milestone_skill_names = [
  "milestone",
  "milestone-execute",
  "milestone-runner",
  "milestone-update",
]
generated_skill_manifest_name = ".claude-setup-generated-skills.json"

[task_documents.bundle_traceability_ids]
requirement_prefix = "REQ"
screen_prefix = "SCR"
flow_prefix = "FLOW"
adr_prefix = "ADR"
acceptance_prefix = "AC"
slice_prefix = "SLICE"
risk_prefix = "RISK"

[task_documents.bundle_optional_source_of_truth_paths]
product = "PRD.md"
ux = "UX_SPEC.md"
ux_behavior = "UX_BEHAVIOR_ACCESSIBILITY.md"
design_references = "DESIGN_REFERENCES/manifest.json"
architecture = "TECH_SPEC.md"
acceptance = "ACCEPTANCE.feature"

[task_documents.bundle_base_docs]
feature = ["PRD.md", "ACCEPTANCE.feature"]
bugfix = ["BUG_REPORT.md", "ROOT_CAUSE.md", "ACCEPTANCE.feature"]
refactor = ["CURRENT_STATE.md", "TARGET_STATE.md"]
migration = ["TECH_SPEC.md", "MIGRATION.md", "VERIFICATION.md", "ROLLBACK.md"]
prototype = ["PRD.md", "VERIFICATION.md"]
ops = ["CHANGE_PLAN.md", "RUNBOOK.md", "ROLLBACK.md", "VERIFICATION.md"]
