id = "web-researcher"
role = "explorer"
description = "Web research specialist for competitor scans and external solution benchmarking."
source = "repo-agent"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "explicit-cancel-or-terminal-close"
late_result_policy = "merge-if-relevant"
timeout_policy = "background-no-close"
allowed_close_reasons = ["explicit-cancel"]

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob", "WebSearch", "WebFetch"]

[codex]
agent_key = "web-researcher"
config_file = "web-researcher.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
