id = "frontend-structure-gatekeeper"
role = "reviewer"
description = "Read-only frontend structure reviewer for module boundaries, SRP, and hook/service extraction."
source = "repo-agent"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "interrupt-drain-ack-close"
late_result_policy = "merge-if-relevant"

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "frontend-structure-gatekeeper"
config_file = "frontend-structure-gatekeeper.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
