id = "interface-inspector"
role = "reviewer"
description = "clean-code-inspector v2.1 인터페이스 품질 보조 에이전트. AST 기반 정량 지표(any/assertion/ts-ignore/상태수/import)를 해석하고 의미를 설명한다."
source = "repo-agent"

[projection]
repo = true
codex = true

[repo]
model = "opus"
tools = ["Read", "Bash", "Grep", "Glob"]

[codex]
agent_key = "interface-inspector"
config_file = "interface-inspector.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
