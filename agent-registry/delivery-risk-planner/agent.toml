id = "delivery-risk-planner"
role = "reviewer"
description = "Plan rollout, migration, and operational guardrails before implementation."
source = "repo-agent"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "explicit-cancel-or-terminal-close"
late_result_policy = "merge-if-relevant"
timeout_policy = "background-no-close"
allowed_close_reasons = ["explicit-cancel"]

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "delivery-risk-planner"
config_file = "delivery-risk-planner.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
