id = "module-structure-gatekeeper"
role = "reviewer"
description = "Read-only reviewer for frontend/backend/common modules, file bloat, and responsibility boundaries."
source = "repo-agent"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "interrupt-drain-ack-close"
late_result_policy = "merge-if-relevant"

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "module-structure-gatekeeper"
config_file = "module-structure-gatekeeper.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
