id = "type-specialist"
role = "reviewer"
description = "Read-only reviewer for shared/public types, interfaces, generics, and contract-safety risks."
source = "codex-builtin"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "interrupt-drain-ack-close"
late_result_policy = "merge-if-relevant"
timeout_policy = "background-no-close"
allowed_close_reasons = ["explicit-cancel", "hard-deadline", "blocked"]

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "type-specialist"
config_file = "type-specialist.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
