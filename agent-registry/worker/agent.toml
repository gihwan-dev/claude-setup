id = "worker"
role = "implementer"
description = "Non-trivial single writer. Apply the smallest validated diff only after triage and plan are settled. No repo exploration. Never used for fast-lane tasks."
source = "codex-builtin"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "blocking"
result_contract = "final-or-checkpoint"
close_protocol = "interrupt-drain-ack-close"
late_result_policy = "not-applicable"
timeout_policy = "observe-and-status-ping"
allowed_close_reasons = ["explicit-cancel", "hard-deadline", "blocked"]

[repo]
model = "sonnet"
tools = ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]

[codex]
agent_key = "worker"
config_file = "implementer.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
