id = "verification-worker"
role = "reviewer"
description = "Read-only validation summarizer. Use only when validation output is noisy or multi-step."
source = "codex-builtin"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "semi-blocking"
result_contract = "final-or-checkpoint"
close_protocol = "explicit-cancel-or-terminal-close"
late_result_policy = "merge-if-relevant"
timeout_policy = "observe-and-status-ping"
allowed_close_reasons = ["explicit-cancel"]

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "verification-worker"
config_file = "verification-worker.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
