id = "storybook-specialist"
role = "implementer"
description = "Storybook/디자인 검증 전문가. Story 파일 생성, 컴포넌트 스크린샷 캡처, Figma 디자인 비교 검증을 수행한다. 팀 작업 시 디자인 검증 및 Story 작성 담당으로 활용. 매핑 스킬: story-generator, design-check, component-screenshot"
source = "repo-agent"

[projection]
repo = true
codex = true

[repo]
model = "sonnet"
tools = ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]

[codex]
agent_key = "storybook-specialist"
config_file = "storybook-specialist.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
