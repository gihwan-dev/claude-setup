id = "architecture-reviewer"
role = "reviewer"
description = "Read-only reviewer for boundaries, layering, public-surface changes, and large refactors."
source = "codex-builtin"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "interrupt-drain-ack-close"
late_result_policy = "merge-if-relevant"

[repo]
model = "sonnet"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "architecture-reviewer"
config_file = "architecture-reviewer.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
