id = "complexity-analyst"
role = "reviewer"
description = "clean-code-inspector v2.1 정량 분석 보조 에이전트. 수동 계수보다 quantitative-metrics.json을 우선 사용해 복잡도 축을 해석·검증한다."
source = "repo-agent"

[projection]
repo = true
codex = true

[orchestration]
blocking_class = "advisory"
result_contract = "preliminary-or-final"
close_protocol = "explicit-cancel-or-terminal-close"
late_result_policy = "merge-if-relevant"
timeout_policy = "background-no-close"
allowed_close_reasons = ["explicit-cancel"]

[repo]
model = "opus"
tools = ["Read", "Bash", "Grep", "Glob"]

[codex]
agent_key = "complexity-analyst"
config_file = "complexity-analyst.toml"
model = "gpt-5.4"
reasoning_effort = "xhigh"
sandbox_mode = "read-only"
