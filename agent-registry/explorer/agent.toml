id = "explorer"
role = "explorer"
description = "Read-only evidence collector focused on discovery, ownership tracing, and repository context."
source = "codex-builtin"

[projection]
repo = true
codex = true

[repo]
model = "haiku"
tools = ["Read", "Grep", "Glob"]

[codex]
agent_key = "explorer"
config_file = "explorer-worker.toml"
model = "gpt-5.4-mini"
reasoning_effort = "low"
sandbox_mode = "read-only"
