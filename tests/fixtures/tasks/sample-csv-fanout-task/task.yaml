task: sample-csv-fanout-task
goal: Demonstrate CSV fan-out execution topology for parallel row-level processing.
success_criteria:
  - Parallel slice execution records its runtime artifacts under runs/parallel-workflow.
  - Shared-file work is reduced to change-group single-lane ownership.
major_boundaries:
  - Static task-bundle planning
  - Parallel runtime artifact execution
work_type: feature
impact_flags:
  - architecture_significant
required_docs:
  - README.md
  - EXECUTION_PLAN.md
  - SPEC_VALIDATION.md
  - STATUS.md
  - PRD.md
  - TECH_SPEC.md
  - ACCEPTANCE.feature
  - ADRs/
source_of_truth:
  product: PRD.md
  architecture: TECH_SPEC.md
  execution: EXECUTION_PLAN.md
  acceptance: ACCEPTANCE.feature
  validation: SPEC_VALIDATION.md
ids:
  requirement_prefix: REQ
  screen_prefix: SCR
  flow_prefix: FLOW
  adr_prefix: ADR
  acceptance_prefix: AC
  slice_prefix: SLICE
  risk_prefix: RISK
delivery_strategy: standard
agent_orchestration:
  strategy: manager
