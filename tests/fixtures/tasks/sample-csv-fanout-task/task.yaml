task: sample-csv-fanout-task
goal: Demonstrate CSV fan-out execution topology for parallel row-level processing.
success_criteria:
  - Row-level parallel execution completes within concurrency limits.
  - Integrator merges shared files without conflict.
major_boundaries:
  - CSV-driven row worker spawning
  - Integrator shared-file merge
work_type: feature
impact_flags:
  - architecture_significant
required_docs:
  - README.md
  - EXECUTION_PLAN.md
  - SPEC_VALIDATION.md
  - STATUS.md
  - PRD.md
  - TECH_SPEC.md
  - ACCEPTANCE.feature
  - ADRs/
  - GLOBAL_CONTEXT.md
  - MERGE_POLICY.md
source_of_truth:
  product: PRD.md
  architecture: TECH_SPEC.md
  execution: EXECUTION_PLAN.md
  acceptance: ACCEPTANCE.feature
  validation: SPEC_VALIDATION.md
ids:
  requirement_prefix: REQ
  screen_prefix: SCR
  flow_prefix: FLOW
  adr_prefix: ADR
  acceptance_prefix: AC
  slice_prefix: SLICE
  risk_prefix: RISK
delivery_strategy: standard
agent_orchestration:
  strategy: manager
  main_thread_role: synthesize-control-only
  planning_helpers:
    - explorer
    - structure-reviewer
  execution_roles:
    implementation: codex-row-worker
    integration: codex-row-worker
    validation: verification-worker
  context_policy: bundle-docs-and-structured-results-only
  fallback_policy: blocked-lane-means-split-replan
  review_policy: explicit-multi-review
validation_gate: blocking
current_phase: design
execution_topology: csv-fanout
orchestration:
  row_unit: api-endpoint
  batch_mode: staged
  shared_context_files:
    - GLOBAL_CONTEXT.md
  roles:
    decomposer: main-thread
    worker: codex-row-worker
    integrator: codex-row-worker
    verifier: codex-row-worker
  csv:
    source: work-items/SLICE-1-items.csv
    id_column: row_id
    output_schema_ref: schemas/row-result.schema.json
    output_csv: runs/SLICE-1-results.csv
    max_concurrency: 4
  merge_policy: integrator-only
