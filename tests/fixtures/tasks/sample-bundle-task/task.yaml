task: sample-bundle-task
goal: Visualize long-running task execution in a timeline-first monitor.
success_criteria:
  - Overview 화면에서 대표 병목 thread를 식별할 수 있다.
  - Timeline 진입 전 blocking spec issue가 모두 해소돼야 한다.
major_boundaries:
  - Timeline overview UI
  - Local ingestion and normalization pipeline
work_type: feature
impact_flags:
  - ui_surface_changed
  - architecture_significant
required_docs:
  - README.md
  - EXECUTION_PLAN.md
  - SPEC_VALIDATION.md
  - STATUS.md
  - IMPLEMENTATION_CONTRACT.md
  - PRD.md
  - UX_SPEC.md
  - UX_BEHAVIOR_ACCESSIBILITY.md
  - DESIGN_REFERENCES/
  - TECH_SPEC.md
  - ACCEPTANCE.feature
  - ADRs/
source_of_truth:
  product: PRD.md
  ux: UX_SPEC.md
  ux_behavior: UX_BEHAVIOR_ACCESSIBILITY.md
  design_references: DESIGN_REFERENCES/manifest.json
  architecture: TECH_SPEC.md
  execution: EXECUTION_PLAN.md
  acceptance: ACCEPTANCE.feature
  validation: SPEC_VALIDATION.md
  implementation: IMPLEMENTATION_CONTRACT.md
ids:
  requirement_prefix: REQ
  screen_prefix: SCR
  flow_prefix: FLOW
  adr_prefix: ADR
  acceptance_prefix: AC
  slice_prefix: SLICE
  risk_prefix: RISK
delivery_strategy: ui-first
agent_orchestration:
  strategy: manager
  main_thread_role: synthesize-control-only
  planning_helpers:
    - explorer
    - structure-reviewer
  execution_roles:
    implementation: worker
    integration: worker
    validation: verification-worker
  context_policy: bundle-docs-and-structured-results-only
  fallback_policy: blocked-lane-means-split-replan
  review_policy: explicit-multi-review
validation_gate: blocking
current_phase: design
