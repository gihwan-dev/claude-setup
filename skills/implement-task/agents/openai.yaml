interface:
  display_name: "Implement Task"
  short_description: "Run main-thread slices from an approved PLAN, execute focused validation, commit, and update STATUS.md"
  default_prompt: "$implement-task 승인된 tasks/<task-slug>/PLAN.md 기준으로 다음 slice를 메인 스레드에서 직접 진행해. focused validation 후 커밋하고 STATUS.md를 갱신해"
policy:
  allow_implicit_invocation: true
