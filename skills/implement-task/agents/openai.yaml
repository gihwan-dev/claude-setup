interface:
  display_name: "Implement Task"
  short_description: "Run approved PLAN slices with worker edit-only, main focused validation, same-worker commit-only, and STATUS.md updates"
  default_prompt: "$implement-task 승인된 tasks/<task-slug>/PLAN.md 기준으로 다음 slice를 진행해. `worker` edit-only -> main focused validation -> same-worker commit-only 순서를 지키고, `liveness gate`/`completion gate`를 분리해 상태 기반으로 close를 판단하면서 STATUS.md를 갱신해"
policy:
  allow_implicit_invocation: true
