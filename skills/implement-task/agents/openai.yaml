interface:
  display_name: "Implement Task"
  short_description: "Run approved PLAN slices with worker edit-only, main focused validation, same-worker commit-only, and STATUS.md updates"
  default_prompt: "$implement-task 승인된 tasks/<task-slug>/PLAN.md 기준으로 다음 slice를 진행해. `worker` edit-only -> main focused validation -> same-worker commit-only 순서를 지키고, 작은/저위험 slice는 메인 수동 리뷰를 우선하고 advisory helper는 `wait timed_out -> status running -> no result -> close` 같은 invalid sequence 없이 background/advisory로 다루면서 STATUS.md를 갱신해"
policy:
  allow_implicit_invocation: true
