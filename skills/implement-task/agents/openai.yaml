interface:
  display_name: "Implement Task"
  short_description: "Select the next bundle slice, run 3-CSV pipeline (read → write → review), then commit and update STATUS"
  default_prompt: >
    $implement-task should read the approved bundle and current slice, keep
    `task.yaml.success_criteria`, `major_boundaries`, and `delivery_strategy`
    as the implementation contract. Read `csv-execution-rules.md` and run the
    3-CSV pipeline (info-collection → implementation → review) for the
    current slice. After the pipeline completes, commit and update
    `STATUS.md`.
policy:
  allow_implicit_invocation: false
