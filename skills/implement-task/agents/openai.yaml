interface:
  display_name: "Implement Task"
  short_description: "Run approved task-bundle slices with worker edit-only, main focused validation, same-worker commit-only, and STATUS.md updates, while keeping legacy PLAN.md as fallback-only compatibility"
  default_prompt: "$implement-task 승인된 task path의 `task.yaml + EXECUTION_PLAN.md + STATUS.md`를 우선 읽고, `SPEC_VALIDATION.md`의 blocking issue가 남아 있으면 구현을 시작하지 마. `task.yaml.success_criteria`, `task.yaml.major_boundaries`, `task.yaml.delivery_strategy`를 구현 계약으로 유지하고, `EXECUTION_PLAN.md`는 `Execution slices`, `Verification`, `Stop / Replan conditions` 순서를 전제로 읽어. `delivery_strategy=ui-first`면 `SLICE-1 -> SLICE-2 -> SLICE-3+` 순서를 건너뛰거나 병합하지 말고, `SLICE-1`/`SLICE-2`에서 real API/backend/data contract/integration diff를 추가하지 마. 각 slice에서 structure preflight(대상 파일 역할, 예상 post-change LOC, split 필요 여부)를 먼저 고정하고, split-first trigger가 켜지면 target file append를 금지해. 같은 slice 안에서 새 모듈 추출이 가능하지 않으면 `blocked + exact split proposal`로 멈춰. path가 명시되지 않았고 후보가 2개 이상이면 자동 실행하지 말고 사용자 확인이 필요하다고 멈춰. 새 task가 없고 legacy `PLAN.md`만 있을 때만 fallback을 허용해. 메인 스레드가 종료 전 실질 영향 문서를 다시 확인한다고 가정하고, 필요한 README/docs/task bundle/openapi/schema/runbook diff는 phase 1에서 validation 전에 같이 반영해. `docs/policy`를 건드렸다면 `python3 scripts/sync_instructions.py`와 `python3 scripts/sync_instructions.py --check`, `skills`를 건드렸다면 `python3 scripts/sync_skills_index.py`와 `python3 scripts/sync_skills_index.py --check`, `agent-registry`를 건드렸다면 `python3 scripts/sync_agents.py`와 `python3 scripts/sync_agents.py --check`를 실행하고 결과를 STATUS/verification에 남겨. 문서 diff까지 포함해 slice budget을 넘기면 현재 slice를 억지로 넓히지 말고 replan해. `worker` edit-only -> main focused validation -> same-worker commit-only 순서를 지키고, 초기 STATUS는 `Current slice=Not started.` / `Next slice=SLICE-1` 기준을 유지해"
policy:
  allow_implicit_invocation: true
