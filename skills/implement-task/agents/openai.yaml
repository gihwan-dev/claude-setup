interface:
  display_name: "Implement Task"
  short_description: "Select the next bundle slice, hand off to $parallel-workflow for 3-CSV execution, then commit and update STATUS"
  default_prompt: >
    $implement-task should read the approved bundle and current slice, keep
    `task.yaml.success_criteria`, `major_boundaries`, and `delivery_strategy`
    as the implementation contract, and hand off to `$parallel-workflow` for
    3-CSV execution. After parallel-workflow completes, commit and update
    `STATUS.md`.
policy:
  allow_implicit_invocation: false
