interface:
  display_name: "React Refactoring"
  short_description: "Critically validate React/TypeScript refactor requests before planning changes, then get approval before executing"
  default_prompt: >
    $react-refactoring 대상 React/TypeScript 파일과 문제점을 먼저 읽고, 사용자의 제안을 그대로
    수용하지 말고 `references/evaluation-criteria.md` 기준으로 실제 문제인지 검증해. 문제 수와
    복잡도에 따라 Standard 또는 Multi-Perspective 분석을 선택하고, 각 이슈를 `수용/수정/기각`
    으로 판단해 근거를 정리해. 계획을 먼저 제시하고 사용자 승인 전에는 실행하지 마. 승인 후에는
    작은 단위로 리팩토링하고 타깃 검증만 수행해.
policy:
  allow_implicit_invocation: true
