interface:
  display_name: "React Refactoring"
  short_description: "Critically validate React/TypeScript refactor requests before planning changes, then get approval before executing"
  default_prompt: >
    $react-refactoring Read the target React/TypeScript file and concerns first. Do not accept the user's proposal
    as-is. Validate whether each concern is real using `references/evaluation-criteria.md`. Choose Standard or
    Multi-Perspective analysis based on issue count and complexity, then classify each issue as `accept/revise/reject`
    with supporting reasoning. Present the plan first and do not execute before user approval. After approval,
    refactor in small slices and run only targeted validation.
policy:
  allow_implicit_invocation: true
