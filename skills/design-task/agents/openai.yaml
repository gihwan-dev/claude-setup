interface:
  display_name: "Design Task"
  short_description: "Handle promoted planning paths after quality preflight, apply a continuity gate before reusing any existing task, record Task continuity and Quality preflight, and create bounded execution slices for promote-refactor or promote-architecture"
  default_prompt: "$design-task quality preflight verdict와 근거를 `Quality preflight` subsection에 기록하고 continuity gate를 먼저 적용해. 기존 task는 goal, 성공 기준, 주요 변경 경계, task type, quality preflight verdict가 모두 같은 단일 후보일 때만 재사용하고, 하나라도 다르면 새 flat task path를 만들어. `Task continuity`에 decision, compared tasks, reason, chosen task path를 적고, planning path가 `promote-refactor` 또는 `promote-architecture`로 확정된 task의 PLAN.md를 설계해. `promote-refactor`면 제거/유지 로직, 모듈 경계, 허용/금지 추상화, 테스트 처리 기준, slice별 focused verification 1개를 포함하고, `promote-architecture`면 `architecture-reviewer` fan-out으로 boundary/public/shared 영향을 먼저 고정한 뒤 slice를 설계해. change boundary, file budget, validation owner, and stop/replan conditions를 각 slice에 명시해"
policy:
  allow_implicit_invocation: true
