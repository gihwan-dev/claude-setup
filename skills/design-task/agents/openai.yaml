interface:
  display_name: "Design Task"
  short_description: "Classify non-trivial work into a task bundle, derive `delivery_strategy`, apply a continuity gate, and create `task.yaml`-based design bundles with dual UX docs and task-local reference packs for ui-first work"
  default_prompt: >-
    $design-task should record the quality-preflight verdict plus evidence, then
    apply the continuity gate first. For existing TS, JS, or React code work,
    include structure preflight: target file role, expected post-change LOC, and
    whether split-first is needed. If the split-first trigger is on, do not
    author plans that assume target-file append. Design every new task as a
    `task.yaml`-based bundle that includes `README.md`, `EXECUTION_PLAN.md`,
    `SPEC_VALIDATION.md`, and `STATUS.md`. `task.yaml` must always include `success_criteria`,
    `major_boundaries`, and `delivery_strategy`. Force `delivery_strategy=ui-first`
    when `work_type in {feature, bugfix, refactor, prototype}` and
    `impact_flags` contains `ui_surface_changed` or `workflow_changed`;
    otherwise use `standard`. `execution_topology` is optional and defaults to
    `keep-local`. Choose `csv-fanout` only when all 5 conditions hold: repeat
    unit, independent acceptance, sparse dependencies, fixed schema, and clear
    merge boundary. Use `hybrid` when only part of that holds. If
    `csv-fanout` or `hybrid` is selected, add the `orchestration` block
    (`row_unit`, `batch_mode`, `shared_context_files`, `roles`, `csv`,
    `merge_policy`) to `task.yaml`. If `csv-fanout` is selected, add
    `GLOBAL_CONTEXT.md`, `work-items/*.csv`, and `MERGE_POLICY.md` to the
    bundle, and forbid row-worker edits to shared files. In continuity
    comparison, normalize post-design bootstrap supplements
    `IMPLEMENTATION_CONTRACT.md` and `source_of_truth.implementation` and do not
    treat them as identity differences. On a `reuse-existing` path, preserve any
    existing bootstrap supplement instead of deleting it, and record it as
    preserved. Reuse an existing task only when there is exactly 1 candidate
    whose goal, success criteria, work type, impact flags, normalized required
    docs, major boundaries, and delivery strategy all match. If
    `delivery_strategy=ui-first`, auto-run `reference-pack` first to fill
    `DESIGN_REFERENCES/`, then let `figma-less-ui-design` write `UX_SPEC.md` and
    `UX_BEHAVIOR_ACCESSIBILITY.md`. Record `source_of_truth.ux = UX_SPEC.md`,
    `source_of_truth.ux_behavior = UX_BEHAVIOR_ACCESSIBILITY.md`, and
    `source_of_truth.design_references = DESIGN_REFERENCES/manifest.json`. If an
    existing design system, shipped UI, or Figma exists, record `reuse + delta`
    instead of inventing a new style. Preserve the exact `UX_SPEC.md` section
    order `Goal/Audience/Platform`, `30-Second Understanding Checklist`,
    `Visual Direction + Anti-goals`, `Reference Pack (adopt/avoid)`, `Glossary +
    Object Model`, `Layout/App-shell Contract`, `Token + Primitive Contract`,
    `Screen + Flow Coverage`, `Implementation Prompt/Handoff`. Preserve the
    exact `UX_BEHAVIOR_ACCESSIBILITY.md` section order `Interaction Model`,
    `Keyboard + Focus Contract`, `Accessibility Contract`, `Live Update
    Semantics`, `State Matrix + Fixture Strategy`, `Large-run Degradation
    Rules`, `Microcopy + Information Expression Rules`, `Task-based Approval
    Criteria`. Add `web-researcher`, `structure-reviewer`, and
    `architecture-reviewer` to UI-planning fan-out only when conditions justify
    them. Read-only repo discovery belongs to the built-in `explorer`,
    external web research belongs to `web-researcher`, and browser
    reproduction belongs to `browser-explorer`; do not replace helper research
    with direct main-thread web exploration. When a planning-role overlay is
    needed, use `planning-role-cards.md` together with the built-in
    `explorer`. In `EXECUTION_PLAN.md`,
    keep the order `SLICE-1=static/visual UI`, `SLICE-2=local state/mock`,
    `SLICE-3+=real API/integration`. State that `SLICE-1` reads checklist,
    layout, token, screen-flow, interaction, accessibility, and microcopy, and
    that `SLICE-2` reads keyboard, focus, live semantics, state matrix or
    fixtures, degradation, and task-based approval criteria. Explicitly forbid
    real API or integration work in `SLICE-1` and `SLICE-2`. If UX docs are
    missing, the reference pack is incomplete, or the 30-second checklist,
    glossary, interaction, accessibility, live-update, degradation, or
    task-based approval sections are undefined, leave them as blocking issues in
    `SPEC_VALIDATION.md`. If baseline repo implementation rules do not yet exist
    for greenfield or new-project work, leave a `$bootstrap-project-rules`
    requirement in `SPEC_VALIDATION.md` under `Blocking issues`, and note in the
    handoff that `source_of_truth.implementation = IMPLEMENTATION_CONTRACT.md`
    may be added after post-design bootstrap. For AI or agent-workflow planning,
    start with `web-researcher` and prioritize official vendor docs. If helpers
    are unavailable, report blocked instead of substituting direct research.
    Preserve the `Execution slices`, `Verification`, and `Stop / Replan
    conditions` order in `EXECUTION_PLAN.md`, and make every slice include
    change boundary, file budget, validation owner, focused validation, split
    decision, and stop or replan conditions. Set the initial `STATUS.md` values
    to `Current slice=Not started.` and `Next slice=SLICE-1`.
policy:
  allow_implicit_invocation: false
