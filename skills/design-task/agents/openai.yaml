interface:
  display_name: "Design Task"
  short_description: "Create bounded execution slices with clear change boundary, file budget, validation owner, and stop/replan conditions"
  default_prompt: "$design-task 코드 수정 없이 조사/옵션 비교를 포함해 slice별 변경 경계/예상 파일 수/validation owner/stop-replan 조건을 명시한 PLAN.md를 갱신해"
policy:
  allow_implicit_invocation: true
