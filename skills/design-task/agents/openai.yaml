interface:
  display_name: "Design Task"
  short_description: "Classify non-trivial work into a task bundle, apply a continuity gate before reusing any existing task, record Task continuity and Quality preflight, and create `task.yaml`-based design bundles with spec validation and bounded execution slices"
  default_prompt: "$design-task quality preflight verdict와 근거를 기록하고 continuity gate를 먼저 적용해. 기존 TS/JS/React 코드 작업이면 structure preflight(대상 파일 역할, 예상 post-change LOC, split-first 필요 여부)를 포함하고, split-first trigger가 켜지면 기존 파일 append 전제 설계를 금지해. 새 task는 `task.yaml` 기반 bundle(`README.md`, `EXECUTION_PLAN.md`, `SPEC_VALIDATION.md`, `STATUS.md` 포함)로 설계하고 legacy `PLAN.md`는 fallback으로만 사용해. `task.yaml`에는 `success_criteria`와 `major_boundaries`를 반드시 채우고, 기존 task는 goal, success_criteria, work type, impact flags, required docs, major boundaries가 모두 같은 단일 후보일 때만 재사용해. `EXECUTION_PLAN.md`는 `Execution slices`, `Verification`, `Stop / Replan conditions` 순서를 지키고, 각 slice에는 change boundary, file budget, validation owner, focused validation, split decision, stop/replan conditions를 명시해. `STATUS.md` 초기값은 `Current slice=Not started.` / `Next slice=SLICE-1`로 맞춰."
policy:
  allow_implicit_invocation: true
