interface:
  display_name: "Design Task"
  short_description: "Classify non-trivial work into a task bundle, derive `delivery_strategy`, apply a continuity gate before reusing any existing task, and create `task.yaml`-based design bundles with spec validation and bounded execution slices"
  default_prompt: "$design-task quality preflight verdict와 근거를 기록하고 continuity gate를 먼저 적용해. 기존 TS/JS/React 코드 작업이면 structure preflight(대상 파일 역할, 예상 post-change LOC, split-first 필요 여부)를 포함하고, split-first trigger가 켜지면 기존 파일 append 전제 설계를 금지해. 새 task는 `task.yaml` 기반 bundle(`README.md`, `EXECUTION_PLAN.md`, `SPEC_VALIDATION.md`, `STATUS.md` 포함)로 설계하고 legacy `PLAN.md`는 fallback으로만 사용해. `task.yaml`에는 `success_criteria`, `major_boundaries`, `delivery_strategy`를 반드시 채워. `delivery_strategy`는 `work_type in {feature, bugfix, refactor, prototype}` 이고 `impact_flags`에 `ui_surface_changed` 또는 `workflow_changed`가 있으면 `ui-first`, 그 외는 `standard`로 고정해. continuity 비교에서는 post-design bootstrap supplement인 `IMPLEMENTATION_CONTRACT.md`와 `source_of_truth.implementation`을 normalize하고 identity 차이로 취급하지 마. reuse-existing 경로라면 기존 bundle에 이미 있던 bootstrap supplement는 삭제하지 말고 preserved로 기록해. 기존 task는 goal, success_criteria, work type, impact flags, normalized required docs, major boundaries, delivery strategy가 모두 같은 단일 후보일 때만 재사용해. `delivery_strategy=ui-first`면 `UX_SPEC.md`를 UX source of truth로 고정하고 `EXECUTION_PLAN.md`에 `SLICE-1=static/visual UI`, `SLICE-2=local state/mock`, `SLICE-3+=real API/integration` 순서를 명시해. `SLICE-1`과 `SLICE-2`에는 real API/integration 금지를 적고, UI state/flow 미정의나 mock 전략 부재는 `SPEC_VALIDATION.md`의 blocking issue로 남겨. greenfield/new-project인데 repo-level implementation rules가 아직 없으면 `SPEC_VALIDATION.md`의 `Blocking issues`에 `$bootstrap-project-rules` 필요 문구를 남기고, post-design bootstrap 후 `source_of_truth.implementation = IMPLEMENTATION_CONTRACT.md`가 추가될 수 있음을 handoff로 적어. AI/agent workflow planning이면 `web-researcher` 또는 메인 스레드 직접 웹 조사로 official vendor docs를 우선 참고해. `EXECUTION_PLAN.md`는 `Execution slices`, `Verification`, `Stop / Replan conditions` 순서를 지키고, 각 slice에는 change boundary, file budget, validation owner, focused validation, split decision, stop/replan conditions를 명시해. `STATUS.md` 초기값은 `Current slice=Not started.` / `Next slice=SLICE-1`로 맞춰."
policy:
  allow_implicit_invocation: true
