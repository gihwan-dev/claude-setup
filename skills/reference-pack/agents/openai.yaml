interface:
  display_name: "Reference Pack"
  short_description: "Task-local UI reference collection advisory that saves shortlist and manifest artifacts under `DESIGN_REFERENCES/` for UI planning"
  default_prompt: >
    `$reference-pack` should fill the task-local `DESIGN_REFERENCES/` directory
    for ui-first planning. Fix the save path to
    `tasks/<task-path>/DESIGN_REFERENCES/`, and create `shortlist.md`,
    `manifest.json`, `raw/`, and `curated/`. Keep 5 to 10 shortlist candidates
    and at least 3 saved references by default (`adopt` 2, `avoid` 1). Preserve
    the `manifest.json` entry schema: `file`, `source_url`, `captured_at`,
    `kind`, `tags`, `adopt_reason`, `avoid_reason`, `notes`. Use browser or web
    research only to gather candidates and capture evidence, and organize the
    result so `UX_SPEC.md` can cite the saved file paths plus adopt or avoid
    reasons directly in `Reference Pack (adopt/avoid)`.
policy:
  allow_implicit_invocation: false
