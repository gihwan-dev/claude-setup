interface:
  display_name: "Reference Pack"
  short_description: "Task-local UI reference collection advisory that saves shortlist and manifest artifacts under `DESIGN_REFERENCES/` for `design-task` ui-first planning"
  default_prompt: >
    `$reference-pack` ui-first planning용 task-local `DESIGN_REFERENCES/`를 채워. 저장 경로는
    `tasks/<task-path>/DESIGN_REFERENCES/`로 고정하고, `shortlist.md`, `manifest.json`, `raw/`,
    `curated/`를 만든다. shortlist는 5~10개 후보를 남기고, saved reference는 최소 3개
    (`adopt` 2, `avoid` 1 기본값)를 남겨. `manifest.json` entry schema는 `file`,
    `source_url`, `captured_at`, `kind`, `tags`, `adopt_reason`, `avoid_reason`, `notes`를
    유지해. browser/web research는 후보와 캡처 근거 수집에만 사용하고, `UX_SPEC.md`의
    `Reference Pack (adopt/avoid)`가 saved file 경로와 adopt/avoid 이유를 직접 참조할 수 있게
    정리해.
policy:
  allow_implicit_invocation: false
