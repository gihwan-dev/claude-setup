interface:
  display_name: "Dev Socratic Design"
  short_description: "소크라테스식 문답으로 설계, 버그 수정 전략, 리팩토링 계획, 기능 설계를 구현 전에 완성하는 명시 호출형 메타-스킬"
  default_prompt: "$dev-socratic-design 이 작업은 구현하지 말고 설계를 완성해줘. 시작 시 agent-dispatch-guide.md를 읽고 서브에이전트 상담 루프를 따라라."

policy:
  allow_implicit_invocation: false

dependencies:
  tools:
    - type: "mcp"
      value: "openaiDeveloperDocs"
      description: "공식 문서 검증용 MCP"
      transport: "streamable_http"
      url: "https://developers.openai.com/mcp"
