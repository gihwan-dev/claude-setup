interface:
  display_name: "Plan"
  short_description: "Read-only task planning — produces a single BRIEF.md with goal, scope, approach, and milestones"
  default_prompt: >-
    $plan explores the codebase read-only, clarifies requirements with the user,
    and writes a single `tasks/<slug>/BRIEF.md`. The BRIEF covers goal, scope,
    approach, and ordered milestones with verification criteria. No code edits.
policy:
  allow_implicit_invocation: false
