interface:
  display_name: "Figma-less UI Design"
  short_description: "No-Figma MVP/prototype UI planning advisory that writes a `UI Planning Packet` into `UX_SPEC.md` and falls back to `reuse + delta` when an existing style source exists"
  default_prompt: >
    `$figma-less-ui-design` no-Figma MVP/prototype UI를 위해 `UX_SPEC.md` 안에 `UI Planning
    Packet`을 작성해. section order는 `Goal/Audience/Platform`, `Visual Direction +
    Anti-goals`, `Reference Pack (adopt/avoid)`, `Layout/App-shell Contract`, `Token +
    Primitive Contract`, `Screen/Flow/State Coverage`, `Review Loop`, `Implementation
    Prompt/Handoff`를 그대로 유지해. 기존 design system, shipped UI, brand guide, Figma가
    있으면 새 스타일을 만들지 말고 반드시 `reuse + delta`로 기록해. `SLICE-1`이 읽을
    layout/token/primitive/review-loop와 `SLICE-2`가 읽을 state matrix/mock/edge states까지
    handoff로 연결해.
policy:
  allow_implicit_invocation: false
