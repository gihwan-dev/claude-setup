interface:
  display_name: "Figma-less UI Design"
  short_description: "No-Figma UI planning advisory that turns task-local references into `UX_SPEC.md` and `UX_BEHAVIOR_ACCESSIBILITY.md`, while falling back to `reuse + delta` when an existing style source exists"
  default_prompt: >
    `$figma-less-ui-design` should read the saved `DESIGN_REFERENCES/manifest.json`
    and produce both `UX_SPEC.md` (`UI Planning Packet`) and
    `UX_BEHAVIOR_ACCESSIBILITY.md` for a no-Figma MVP/prototype UI. Preserve the
    `UX_SPEC.md` section order:
    `Goal/Audience/Platform`, `30-Second Understanding Checklist`, `Visual
    Direction + Anti-goals`, `Reference Pack (adopt/avoid)`, `Glossary + Object
    Model`, `Layout/App-shell Contract`, `Token + Primitive Contract`, `Screen +
    Flow Coverage`, `Implementation Prompt/Handoff`. Preserve the
    `UX_BEHAVIOR_ACCESSIBILITY.md` section order: `Interaction Model`,
    `Keyboard + Focus Contract`, `Accessibility Contract`, `Live Update
    Semantics`, `State Matrix + Fixture Strategy`, `Large-run Degradation
    Rules`, `Microcopy + Information Expression Rules`, `Task-based Approval
    Criteria`. If an existing design system, shipped UI, brand guide, or Figma
    exists, do not invent a new style; record `reuse + delta`. The handoff
    should connect `SLICE-1` to checklist, layout, token, screen-flow,
    interaction, accessibility, and microcopy sections, and connect `SLICE-2`
    to keyboard, focus, live semantics, state matrix or fixtures, degradation,
    and task-based approval criteria.
policy:
  allow_implicit_invocation: false
