interface:
  display_name: "Bootstrap Project Rules"
  short_description: "design-task 이후 구현 전 단계에서 스택/아키텍처/검증 규칙을 고정하고 repo/task 계약 문서를 만든다"
  default_prompt: "$bootstrap-project-rules 선택된 task bundle을 읽고 구현 전에 필요한 repo baseline `docs/ai/ENGINEERING_RULES.md`와 task supplement `tasks/<task-path>/IMPLEMENTATION_CONTRACT.md`를 만들어줘. 강화된 `UX_SPEC.md`, `UX_BEHAVIOR_ACCESSIBILITY.md`, `DESIGN_REFERENCES/manifest.json`을 먼저 읽고, UX ownership은 두 UX 문서에 남긴 채 implementation-facing rule만 잠가. 현재 repo 사실을 먼저 탐색하고, 되돌리기 어려운 결정만 짧게 질문해. dependency policy는 `Locked now`, `Deferred`, `Banned/Avoid`로 분리하고, 선택 라이브러리는 trigger 없이는 `Deferred`에 남겨. `Locked now`에는 styling stack, component source, Storybook/screenshot tooling, token source path를 포함해. root `AGENTS.md`는 concise inline do/don't only, `CLAUDE.md`는 `@docs/ai/ENGINEERING_RULES.md` import 중심으로, `README.md`는 human-facing 링크 섹션만 managed section(`<!-- bootstrap-project-rules:start -->` / `<!-- bootstrap-project-rules:end -->`)으로 갱신해. `task.yaml.required_docs`와 `source_of_truth.implementation`도 맞추고, bootstrap 관련 blocking issue만 해소해."
policy:
  allow_implicit_invocation: false
