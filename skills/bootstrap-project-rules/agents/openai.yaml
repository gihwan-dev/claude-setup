interface:
  display_name: "Bootstrap Project Rules"
  short_description: "Lock the implementation stack, architecture boundaries, and validation rules after design-task, then create the repo/task contract docs."
  default_prompt: "$bootstrap-project-rules Read the selected task bundle and create the repo baseline `docs/ai/ENGINEERING_RULES.md` plus the task supplement `tasks/<task-path>/IMPLEMENTATION_CONTRACT.md` needed before implementation. Read the strengthened `UX_SPEC.md`, `UX_BEHAVIOR_ACCESSIBILITY.md`, and `DESIGN_REFERENCES/manifest.json` first, keep UX ownership in those two UX docs, and lock only implementation-facing rules here. Explore current repo facts first and ask only short questions for hard-to-reverse decisions. Split the dependency policy into `Locked now`, `Deferred`, and `Banned/Avoid`, and leave optional libraries in `Deferred` unless a trigger already justifies locking them. Include the styling stack, component source, Storybook/screenshot tooling, and token source path in `Locked now`. Do not create or update a root global memory markdown file. If `README.md` exists, update only its human-facing managed link section (`<!-- bootstrap-project-rules:start -->` / `<!-- bootstrap-project-rules:end -->`). Also update `task.yaml.required_docs` and `source_of_truth.implementation`, and resolve only bootstrap-related blocking issues."
policy:
  allow_implicit_invocation: false
