# _state.yaml schema for design-docs
#
# Path: tasks/<slug>/design/_state.yaml
# Lifecycle: created in plan phase, updated after every doc write in flesh/refine
#
# Schema overview:
#   slug           : kebab-case string matching parent directory
#   work_mode      : architecture | bugfix | refactor | feature
#   phase          : plan | flesh | refine | done | blocked
#   signals        : 8-axis signal map, each value: true | false | unknown
#   interview_answers: k/v pairs filled during flesh interview
#   bundle         : list of docs, each with status and open_questions counts
#   next_action    : 1-line hint for session resumption
#   log            : append-only ISO-timestamped event log
#   references     : pointers to related external docs (optional)

# Initial values (written when plan phase starts):

slug: <kebab-case-slug>
work_mode: feature          # placeholder until classified
phase: plan
signals:
  has_user_problem: unknown
  scope_clarity: unknown
  has_ui: unknown
  has_user_interaction: unknown
  public_facing: unknown
  exposes_api: unknown
  changes_contract: unknown
  touches_multiple_services: unknown
  new_service: unknown
  data_flow_changes: unknown
  has_nontrivial_decision: unknown
  handles_pii: unknown
  auth_changes: unknown
  compliance_required: unknown
  requires_measurement: unknown
  pm_dashboard_needed: unknown
  perf_sensitive: unknown
  scale_sensitive: unknown
  new_deployable: unknown

interview_answers:
  users_and_jobs: null
  success_criteria: null
  scope_and_non_scope: null
  constraints_and_deadlines: null
  reuse_surface: null
  data_and_integrations: null
  quality_attributes: null
  future_direction: null

bundle: []
# Each entry after plan freeze:
# - name: prd-lite
#   path: tasks/<slug>/design/PRD.md
#   status: placeholder     # placeholder | drafted | refined | skipped
#   confidence: low          # low | medium | high
#   open_questions:
#     must_answer: 0
#     nice_to_have: 0
#     decision_candidate: 0
#     assumption_candidate: 0
#   rationale: "<why this doc was included or skipped>"

next_action: "classify work mode and infer signals"
log:
  - "<ISO-timestamp>: phase=plan, design-docs session started"
references:
  socratic_design: null     # e.g. docs/design/<slug>.md
  brief: null               # e.g. tasks/<slug>/BRIEF.md
