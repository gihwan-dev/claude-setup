interface:
  display_name: "Build"
  short_description: "Orchestrate Codex execution of phases from BRIEF.md — prompt crafting, user approval, Codex delegation"
  default_prompt: >-
    $build reads `tasks/<slug>/BRIEF.md` and previous phase reports, crafts
    a Codex prompt for the next phase, presents it to the user for approval,
    then delegates implementation to Codex. Claude never writes code directly.
policy:
  allow_implicit_invocation: false
