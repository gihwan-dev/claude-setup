interface:
  display_name: "Figma Codex Pipeline"
  short_description: "Page-level Figma-to-Code pipeline: decompose a page into semantic units, generate components in parallel via Codex, integrate, and verify"
  default_prompt: >
    $figma-codex-pipeline Take a page-level Figma URL and target directory, then
    run the 4-phase pipeline. Phase 1: collect project rules through the Setup
    Interview, pre-fetch Figma data, decompose the page into semantic units, and
    generate `components.csv`. Ask for approval at the gate before continuing.
    Phase 2: run parallel component generation with `spawn_agents_on_csv`.
    Workers read only pre-fetched files and `shared_context.json`, and write only
    to `target_path`. Phase 3: the main agent assembles the root component,
    reconciles tokens, normalizes imports, and adds responsive wrappers. Phase 4:
    run parallel verification with `verification.csv` for
    lint/typecheck/screenshot/viewport/accessibility checks. If Critical issues
    are found, fix in Phase 3 and re-verify up to 2 rounds. Use
    figma-to-code/references/token-mapping.md for token mapping and
    error-handling.md for error handling.
policy:
  allow_implicit_invocation: true
