interface:
  display_name: "Multi Review"
  short_description: "Multi-agent review entry for the current diff or a selected target"
  default_prompt: >
    $multi-review first read `references/reviewer-matrix.md` and execute a
    multi-agent review. Keep baseline reviewer selection and conditional reviewer
    expansion aligned with that reference and `scripts/workflow_contract.py`.
    Before reviewer fan-out, classify touched files with
    `scripts/workflow_contract.py`; if hotspots are selected, pass
    `review_mode = diff+full-file-hotspots`, `diff+full-file-hotspots`, and
    `hotspot_paths` to `structure-reviewer` while keeping other reviewers
    diff-only. Keep `maintainability` output separate from `correctness`,
    `state`, and `test gap`.
    Before reviewer results return, do not read more files, run more searches,
    or continue exploration beyond `wait` and result collection. After reviewer
    fan-out, the main agent does not do parallel side work; any follow-up
    exploration happens only after results return and stays minimal. The default
    target is the current worktree diff vs `HEAD`, but a user-specified path,
    commit, or range takes precedence. Keep the review read-only, and synthesize
    results as findings first and summary second, ordered by severity.
policy:
  allow_implicit_invocation: false
