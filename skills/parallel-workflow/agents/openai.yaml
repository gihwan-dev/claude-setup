interface:
  display_name: "Parallel Workflow"
  short_description: "Standard 3-CSV execution for all bundle slices: info-collection → implementation → review"
  default_prompt: >
    $parallel-workflow should read the approved bundle and current slice,
    determine `execution_topology`, and run the 3-CSV pipeline. CSV-1 and
    CSV-3 are always parallel with minimum 2 helpers. CSV-2 parallelism
    depends on topology. For csv-fanout, fail closed to `$multi-work` when
    routing is not locked. Update only the STATUS.md sections owned by this
    skill.
policy:
  allow_implicit_invocation: false
