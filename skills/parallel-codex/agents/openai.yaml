interface:
  display_name: "Parallel Codex"
  short_description: "DAG 기반 병렬 파이프라인 — 의존성 분석, Codex 병렬 실행, 호환성 검증, 개별 task MR(→ main) 점진 생성. 여러 작업 동시 개발 시 사용."
  default_prompt: >-
    $parallel-codex는 작업 리스트를 의존성 DAG로 분석하여 위상 정렬된 그룹으로
    배치한다. 각 그룹 내 작업은 git worktree에서 Codex가 병렬 실행하고,
    그룹 간 전이 시 임시 브랜치(temp/verify-*)로 호환성 검증한다. 그룹별로
    개별 task MR(→ main)을 점진적으로 생성하고 머지 순서 가이드를 제공한다.
    후속 그룹 MR은 이전 그룹 머지 후 $parallel-codex resume으로 생성한다.
policy:
  allow_implicit_invocation: false
