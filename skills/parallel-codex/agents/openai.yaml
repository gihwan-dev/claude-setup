interface:
  display_name: "Parallel Codex"
  short_description: "DAG 기반 그룹 순차 + 병렬 파이프라인 — 의존성 분석, 위상 정렬 그룹 배치, Codex 병렬 실행, stage 브랜치 통합, draft MR 일괄 생성"
  default_prompt: >-
    $parallel-codex는 작업 리스트를 의존성 DAG로 분석하여 위상 정렬된 그룹으로
    배치한다. 각 그룹 내 작업은 git worktree에서 Codex가 병렬 실행하고,
    그룹 간 전이 시 Codex가 stage 브랜치로 통합 + 검증한다. 완료 후 draft MR을
    일괄 생성하고 머지 순서 가이드를 제공한다.
policy:
  allow_implicit_invocation: false
