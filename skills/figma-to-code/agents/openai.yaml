interface:
  display_name: "Figma to Code"
  short_description: "Turn a Figma URL and target component path into token-based React code after reading Figma context and local patterns"
  default_prompt: >
    $figma-to-code First parse the Figma URL and target component file path, then
    verify the `node-id`. Collect design data through `get_screenshot`,
    `get_design_context`, and `get_variable_defs`, then read nearby component
    patterns such as `cn()`, exports, props, and aliases. Map tokens and
    components using `references/token-mapping.md`, and generate React code that
    prefers `@exem-fe/react`, follows the `@/` alias, uses named exports, and
    preserves root `className` composition. Follow
    `references/error-handling.md` for overwrite behavior, URL errors, MCP
    failures, and result summary format.
policy:
  allow_implicit_invocation: true
