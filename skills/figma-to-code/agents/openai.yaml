interface:
  display_name: "Figma to Code"
  short_description: "Turn a Figma URL and target component path into token-based React code after reading Figma context and local patterns"
  default_prompt: >
    $figma-to-code Figma URL과 대상 컴포넌트 파일 경로를 먼저 파싱하고 `node-id`를 확인해.
    `get_screenshot`, `get_design_context`, `get_variable_defs`로 디자인 데이터를 수집한 뒤 주변
    컴포넌트 패턴(`cn()`, export, props, alias)을 읽어. `references/token-mapping.md` 기준으로
    토큰과 컴포넌트를 매핑하고, `@exem-fe/react` 우선, `@/` alias, named export, root
    `className` 합성 규칙을 지켜 React 코드를 생성해. overwrite, URL 오류, MCP 실패, 결과 요약
    형식은 `references/error-handling.md`를 따른다.
policy:
  allow_implicit_invocation: true
